{% extends "base.html" %}
{% block content %}
<h1>Finding restored</h1>
<section class="panel">
  <p>The selected Finding Template was restored to {{ server_name }}.</p>
  <dl>
    <dt>Created ID</dt><dd>{{ created_id }}</dd>
    <dt>Title</dt><dd>{{ record.title }}</dd>
    <dt>Backup</dt><dd>{{ filename }}</dd>
  </dl>
  <div class="actions">
    <a class="button secondary" href="{{ url_for('api_backup_detail', side=side, filename=filename) }}">Back to backup</a>
  </div>
</section>
{% endblock %}
