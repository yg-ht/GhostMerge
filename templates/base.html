<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GhostMerge</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --line: #c8ced8;
        --text: #17202c;
        --muted: #596579;
        --accent: #126a5b;
        --danger: #a23333;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 15px;
      }
      header {
        background: #1f2937;
        color: white;
        padding: 14px 24px;
      }
      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px;
      }
      h1, h2 {
        margin: 0 0 16px;
        letter-spacing: 0;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 18px;
        margin-bottom: 16px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }
      label {
        display: block;
        font-weight: 650;
        margin-bottom: 8px;
      }
      input, select, textarea, button, .button {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 5px;
        padding: 10px;
        font: inherit;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      button, .button {
        display: inline-block;
        width: auto;
        background: var(--accent);
        border-color: var(--accent);
        color: white;
        cursor: pointer;
        text-decoration: none;
      }
      .secondary {
        background: #495569;
        border-color: #495569;
      }
      .error {
        border-color: var(--danger);
        color: var(--danger);
      }
      dl {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 8px 16px;
      }
      dt {
        color: var(--muted);
      }
      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        background: #f0f2f5;
        padding: 12px;
        border-radius: 5px;
        max-height: 280px;
        overflow: auto;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <header><strong>GhostMerge</strong></header>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
