<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GhostMerge</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --line: #c8ced8;
        --text: #021127;
        --muted: #596579;
        --brand-black: #021127;
        --brand-navy: #38389B;
        --brand-purple: #4820a0;
        --brand-green: #27FB6B;
        --brand-blue: #446DF6;
        --accent: #38389B;
        --accent-soft: #eef0ff;
        --warn-soft: #fff2cc;
        --add: #dff3e7;
        --remove: #f8dfdf;
        --danger: #a23333;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 15px;
      }
      header {
        background: var(--brand-black);
        color: white;
        padding: 14px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }
      header a {
        color: white;
        text-decoration: none;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        font-size: 20px;
        font-weight: 750;
      }
      .brand img {
        width: 72px;
        height: 72px;
        object-fit: contain;
      }
      nav {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px;
      }
      h1, h2 {
        margin: 0 0 16px;
        letter-spacing: 0;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 18px;
        margin-bottom: 16px;
      }
      .progress {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 8px;
        margin-bottom: 16px;
      }
      .metric {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
      }
      .metric strong {
        display: block;
        font-size: 20px;
      }
      .record-table {
        width: 100%;
        border-collapse: collapse;
      }
      .record-table th,
      .record-table td {
        border-bottom: 1px solid var(--line);
        padding: 8px;
        text-align: left;
        vertical-align: top;
      }
      .record-table tr.changed {
        background: var(--warn-soft);
      }
      .record-table tr.selectable {
        cursor: pointer;
      }
      .record-table tr.selected {
        outline: 2px solid var(--brand-blue);
        background: var(--accent-soft);
      }
      .select-cell {
        width: 44px;
        text-align: center;
      }
      .decision-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }
      .decision-button {
        width: 100%;
        min-height: 58px;
        text-align: left;
        background: var(--panel);
        color: var(--text);
        border-color: var(--line);
      }
      .decision-button.default {
        background: var(--accent-soft);
        border-color: var(--brand-blue);
      }
      .shortcut {
        display: inline-block;
        min-width: 24px;
        margin-right: 8px;
        padding: 2px 6px;
        border: 1px solid var(--line);
        border-radius: 4px;
        text-align: center;
        color: var(--muted);
        background: white;
      }
      .diff-line {
        display: grid;
        grid-template-columns: 72px 1fr;
        gap: 8px;
        border-bottom: 1px solid #e2e6ec;
        padding: 6px 8px;
      }
      .diff-line.added {
        background: var(--add);
      }
      .diff-line.removed {
        background: var(--remove);
      }
      .diff-line.offered {
        background: var(--accent-soft);
      }
      mark {
        background: var(--brand-green);
        color: var(--brand-black);
        padding: 0 2px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }
      label {
        display: block;
        font-weight: 650;
        margin-bottom: 8px;
      }
      input, select, textarea, button, .button {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 5px;
        padding: 10px;
        font: inherit;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      button, .button {
        display: inline-block;
        width: auto;
        background: var(--brand-green);
        border-color: var(--brand-green);
        color: var(--brand-black);
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }
      .secondary {
        background: var(--brand-navy);
        border-color: var(--brand-navy);
        color: white;
      }
      .error {
        border-color: var(--danger);
        color: var(--danger);
      }
      dl {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 8px 16px;
      }
      dt {
        color: var(--muted);
      }
      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        background: #f0f2f5;
        padding: 12px;
        border-radius: 5px;
        max-height: 280px;
        overflow: auto;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <header>
      <a class="brand" href="{{ url_for('index') }}">
        <img src="{{ url_for('static', filename='GhostMerge-logo.png') }}" alt="" aria-hidden="true">
        <span>GhostMerge</span>
      </a>
      <nav>
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('index') }}">New merge</a>
      </nav>
    </header>
    <main>
      {% if progress %}
      <section class="progress" aria-label="Review progress">
        <div class="metric"><span>Phase</span><strong>{{ progress.phase }}</strong></div>
        <div class="metric"><span>Match</span><strong>{{ progress.current_match }} / {{ progress.total_matches }}</strong></div>
        <div class="metric"><span>Completed</span><strong>{{ progress.completed_matches }}</strong></div>
        <div class="metric"><span>Unmatched</span><strong>{{ progress.unmatched_left }} L / {{ progress.unmatched_right }} R</strong></div>
      </section>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='review_shortcuts.js') }}"></script>
  </body>
</html>
