<form class="abandon-form" action="{{ url_for('abandon_job', job_id=job_id) }}" method="post" onsubmit="return confirm('Abandon this merge job? Local review progress for this job will be deleted.');">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <button class="danger" type="submit">Abandon merge</button>
</form>
