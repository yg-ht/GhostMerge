{% extends "base.html" %}
{% block content %}
<h1>Sensitivity review</h1>
<section class="panel">
  <dl>
    <dt>Side</dt><dd>{{ item.side }}</dd>
    <dt>Record</dt><dd>{{ item.record_index + 1 }}</dd>
    <dt>Field</dt><dd>{{ item.field_name }}</dd>
    <dt>Term</dt><dd>{{ item.sensitive_term }}</dd>
    <dt>Offered</dt><dd>{{ item.offered or "None" }}</dd>
  </dl>
  <pre>{{ item.field_value }}</pre>
</section>
<form class="panel" action="{{ url_for('apply_sensitivity', job_id=job.job_id) }}" method="post">
  <input type="hidden" name="side" value="{{ item.side }}">
  <input type="hidden" name="record_index" value="{{ item.record_index }}">
  <input type="hidden" name="field_name" value="{{ item.field_name }}">
  <input type="hidden" name="sensitive_term" value="{{ item.sensitive_term }}">
  <input type="hidden" name="offered" value="{{ item.offered or "" }}">
  <label for="action">Decision</label>
  <select id="action" name="action">
    {% if item.offered is not none %}<option value="offered">Use offered replacement</option>{% endif %}
    <option value="keep">Keep value</option>
    <option value="custom">Custom replacement</option>
  </select>
  <label for="custom_value">Custom replacement</label>
  <textarea id="custom_value" name="custom_value">{{ item.offered or "" }}</textarea>
  <p><button type="submit">Apply decision</button></p>
</form>
{% endblock %}
